<!doctype html>
<html>
    <head>
        <base target="_top" />
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
                margin-bottom: 20px;
            }

            th,
            td {
                border: 1px solid #ddd;
                padding: 8px;
                text-align: left;
            }

            th {
                background-color: #f5f5f5;
            }
        </style>
    </head>

    <body>
        <p>Minimum shift length exceptions for <strong>{{periodLabel}}</strong>.</p>

        {{#studios}}
        <h3>{{studio}}</h3>
        <table>
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Position</th>
                    <th>Shift date</th>
                    <th>Worked</th>
                    <th>Minimum</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                {{#shifts}}
                <tr>
                    <td>{{employeeName}}</td>
                    <td>{{positionName}}</td>
                    <td>{{shiftDate}}</td>
                    <td>{{workedLength}}</td>
                    <td>{{minimumLength}}</td>
                    <td>{{notes}}</td>
                </tr>
                {{/shifts}}
            </tbody>
        </table>
        {{/studios}}
    </body>
</html>
